<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fdf8eb" />
<meta name="color-scheme" content="light" />
<meta name="format-detection" content="telephone=no" />
<title>Mini Italy 2026 · Gerhard · Happy Camper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ─────────────────────────────────────────────────────────────
   MINI ITALY 2026 · GERHARD HUBER · HAPPY CAMPER
   Single-file mobile-first travel companion.
   Layout follows the Isaac template; palette is Italian summer
   (wine · cream · olive · ochre).
   No API keys required — weather uses Open-Meteo (free, no key).
   Editable trip data lives in TRIP_DATA near the bottom of <script>.
   ───────────────────────────────────────────────────────────── */

:root {
  /* Italian summer palette — wine · cream · olive · ochre */
  --ink:          #2a1f1a;
  --ink-2:        #4a3b32;
  --ink-3:        #75645a;
  --ink-4:        #a39185;

  --cream:        #f8f1e1;
  --paper:        #fdf8eb;
  --paper-2:      #fbf3df;
  --white:        #ffffff;

  --wine:         #6b1f2a;
  --wine-deep:    #4a1018;
  --wine-soft:    #8a3a44;
  --wine-pale:    #f4e4e6;

  --ochre:        #b8893a;
  --ochre-bright: #d4ae6a;
  --ochre-soft:   #f2e3c5;

  --olive:        #5c6b3f;
  --olive-soft:   #e8ecdc;

  --line:         rgba(107, 31, 42, 0.14);
  --line-soft:    rgba(107, 31, 42, 0.07);
  --line-strong:  rgba(107, 31, 42, 0.30);

  --green:        #2d6a3f;
  --green-soft:   #d6efd6;
  --amber:        #b88e2a;
  --amber-soft:   #fff4cc;
  --red:          #b8291e;
  --red-soft:     #fdecea;
  --grey-soft:    #ececea;

  --shadow-sm:    0 1px 2px rgba(42,31,26,0.05), 0 1px 1px rgba(42,31,26,0.03);
  --shadow-md:    0 4px 16px rgba(42,31,26,0.06), 0 1px 3px rgba(42,31,26,0.04);
  --shadow-lg:    0 12px 32px rgba(42,31,26,0.08), 0 2px 6px rgba(42,31,26,0.04);

  --r-sm:         8px;
  --r-md:         12px;
  --r-lg:         16px;
  --r-xl:         22px;

  --header-h:     74px;
  --tab-h:        50px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  overflow-x: hidden;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
a { color: var(--wine); text-decoration: none; }

/* ─── HEADER ─────────────────────────────────────────────── */
#app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(253, 248, 235, 0.94);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--line);
  padding-top: env(safe-area-inset-top);
}
.header-top {
  padding: 12px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--wine) 0%, var(--wine-deep) 100%);
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.brand-text { min-width: 0; }
.brand-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 20px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: 0.01em;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-sub {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 3px;
  font-weight: 500;
}
.clock-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  text-align: right;
  flex-shrink: 0;
}
#cest-clock {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 19px;
  font-weight: 500;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
#trip-day-label {
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 4px;
  font-weight: 500;
}

/* tab nav */
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 0 20px;
  border-top: 1px solid var(--line-soft);
  max-width: 1200px;
  margin: 0 auto;
}
.tab-btn {
  flex: 1;
  padding: 10px 8px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  border-bottom: 2px solid transparent;
  transition: color 0.18s, border-color 0.18s;
  position: relative;
}
.tab-btn.active {
  color: var(--wine);
  border-bottom-color: var(--wine);
}
.tab-btn:active { transform: scale(0.97); }

/* ─── MAIN PANELS ────────────────────────────────────────── */
.tab-panel {
  display: none;
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 18px 80px;
}
.tab-panel.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ─── HERO ───────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 28px 16px 26px;
  background: linear-gradient(180deg, var(--paper-2) 0%, var(--paper) 100%);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(184,137,58,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(107,31,42,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.hero-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  margin-bottom: 10px;
  position: relative;
}
.hero-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 44px;
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 4px;
  position: relative;
}
.hero-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--wine);
}
.hero-sub {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 19px;
  color: var(--ink-2);
  margin-top: 4px;
  position: relative;
}
.hero-rule {
  width: 60px;
  height: 1px;
  background: var(--ochre);
  margin: 14px auto;
  position: relative;
}
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 16px;
  font-size: 13px;
  color: var(--ink-2);
  position: relative;
  margin-top: 4px;
}
.hero-meta strong { color: var(--ink); font-weight: 600; }
.hero-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin-top: 14px;
  position: relative;
  letter-spacing: 0.01em;
}
.hero-name-sub {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 4px;
  font-weight: 500;
  position: relative;
}

/* ─── SECTION LABELS ─────────────────────────────────────── */
.section-label {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  margin: 24px 0 14px;
}
.section-label::before,
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ─── HOTELS SUMMARY ─────────────────────────────────────── */
.hotels-grid {
  display: grid;
  gap: 8px;
  margin-bottom: 8px;
}
.hotel-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
}
.hotel-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--wine-pale);
  color: var(--wine);
  display: grid;
  place-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.hotel-info { flex: 1; min-width: 0; }
.hotel-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 2px;
}
.hotel-meta {
  font-size: 11.5px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.hotel-link {
  color: var(--ochre);
  font-size: 18px;
  flex-shrink: 0;
}

/* ─── DAY CARDS ──────────────────────────────────────────── */
.day-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  margin-bottom: 14px;
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.day-card.is-current {
  border-color: var(--wine);
  box-shadow: var(--shadow-md), 0 0 0 3px rgba(107,31,42,0.06);
}
.day-card.is-past { opacity: 0.62; }

.day-header {
  width: 100%;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  transition: background 0.15s;
}
.day-header:hover { background: var(--paper-2); }
.day-num {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  border-radius: 50%;
  background: var(--cream);
  border: 1px solid var(--line);
  display: grid;
  place-items: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
}
.day-card.is-current .day-num {
  background: var(--wine);
  color: var(--paper);
  border-color: var(--wine);
}
.day-meta { flex: 1; min-width: 0; }
.day-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.15;
}
.day-title {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 2px;
  letter-spacing: 0.02em;
}
.day-city-badge {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  background: var(--ochre-soft);
  padding: 3px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.day-toggle {
  font-size: 18px;
  color: var(--ink-3);
  transition: transform 0.25s;
  flex-shrink: 0;
  margin-left: 4px;
}
.day-card.expanded .day-toggle { transform: rotate(180deg); }

.day-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--line-soft);
}
.day-card.expanded .day-body { display: block; }

/* hotel/weather strip */
.day-strip {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 12px 0 14px;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 14px;
}
.strip-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  color: var(--ink-2);
}
.strip-item .label {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  flex-shrink: 0;
  min-width: 56px;
}
.strip-item .val { font-weight: 500; color: var(--ink); flex: 1; }
.weather-icon { font-size: 16px; }

/* day note */
.day-note {
  background: var(--ochre-soft);
  border-left: 3px solid var(--ochre);
  padding: 10px 12px;
  font-size: 13px;
  font-style: italic;
  color: var(--ink-2);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin-bottom: 14px;
  line-height: 1.45;
}

/* stops timeline */
.stops { display: flex; flex-direction: column; gap: 0; }
.stop {
  position: relative;
  padding: 8px 0 18px 38px;
  border-left: 1px solid var(--line);
  margin-left: 14px;
}
.stop:last-child { padding-bottom: 4px; }
.stop::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 14px;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--white);
  border: 2px solid var(--ochre);
  z-index: 1;
}
.stop[data-type="restaurant"]::before { border-color: var(--wine); }
.stop[data-type="hotel"]::before { border-color: var(--olive); }
.stop[data-type="drive"]::before { border-color: var(--ink-3); }
.stop[data-type="flight"]::before { border-color: var(--ochre); }

.stop-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.stop-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--wine);
  letter-spacing: 0.01em;
  flex-shrink: 0;
}
.stop-type-tag {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 8px;
  background: var(--paper-2);
  border: 1px solid var(--line);
}
.stop-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
  margin: 2px 0 4px;
}
.stop-subtitle {
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 6px;
  font-style: italic;
}

/* status badges */
.badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-right: 5px;
  margin-bottom: 4px;
  border: 1px solid transparent;
}
.badge.confirmed { background: var(--green-soft); color: var(--green); border-color: rgba(45,106,63,0.2); }
.badge.pending   { background: var(--amber-soft); color: var(--amber); border-color: rgba(184,142,42,0.25); }
.badge.priority  { background: var(--red-soft); color: var(--red); border-color: rgba(184,41,30,0.25); }
.badge.suggestion{ background: var(--grey-soft); color: var(--ink-3); border-color: var(--line); }
.badge.host      { background: var(--olive-soft); color: var(--olive); border-color: rgba(92,107,63,0.25); }

.stop-loc {
  font-size: 12.5px;
  color: var(--ink-3);
  margin: 4px 0 8px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.stop-loc::before { content: "📍"; font-size: 11px; flex-shrink: 0; line-height: 1.4; }

.stop-notes {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
  margin: 6px 0 10px;
}
.stop-notes em {
  background: var(--wine-pale);
  padding: 1px 5px;
  border-radius: 3px;
  font-style: normal;
  color: var(--wine-deep);
  font-weight: 500;
}

.stop-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.act-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 11px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  background: var(--cream);
  color: var(--ink);
  border-radius: 18px;
  border: 1px solid var(--line);
  transition: all 0.15s;
}
.act-btn:hover { background: var(--ochre-soft); border-color: var(--ochre); }
.act-btn:active { transform: scale(0.96); }
.act-btn.primary { background: var(--wine); color: var(--paper); border-color: var(--wine); }
.act-btn.primary:hover { background: var(--wine-deep); border-color: var(--wine-deep); }
.act-btn.tel { background: var(--olive-soft); border-color: rgba(92,107,63,0.25); color: var(--olive); }

/* drive subcard */
.drive-card {
  background: var(--paper-2);
  border: 1px dashed var(--line-strong);
  border-radius: var(--r-md);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.drive-card .miles {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ochre);
  flex-shrink: 0;
}

/* ─── UTILITIES TAB ──────────────────────────────────────── */
.util-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.util-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.15;
}
.util-sub {
  font-size: 11.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  margin-bottom: 14px;
}

/* currency */
.fx-rate-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 12px;
  padding: 8px 12px;
  background: var(--paper-2);
  border-radius: var(--r-sm);
  border: 1px solid var(--line-soft);
}
.fx-rate-row strong { color: var(--ink); }
.fx-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.fx-row label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  width: 36px;
  flex-shrink: 0;
}
.fx-row input {
  flex: 1;
  font: 500 17px 'DM Sans', sans-serif;
  font-variant-numeric: tabular-nums;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.fx-row input:focus { border-color: var(--wine); }
.fx-edit {
  font-size: 11.5px;
  color: var(--ochre);
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* generic list */
.kv-list { display: grid; gap: 8px; }
.kv-item {
  display: grid;
  grid-template-columns: minmax(90px, auto) 1fr;
  gap: 10px;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line-soft);
}
.kv-item:last-child { border-bottom: 0; }
.kv-key {
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  padding-top: 1px;
}
.kv-val { color: var(--ink); font-weight: 500; }
.kv-val .sub { display: block; color: var(--ink-3); font-weight: 400; font-size: 12px; margin-top: 2px; }

/* tip block */
.tip {
  background: var(--olive-soft);
  border-left: 3px solid var(--olive);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--ink-2);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin: 12px 0;
  line-height: 1.5;
}
.tip strong { color: var(--olive); }
.alert {
  background: var(--red-soft);
  border-left: 3px solid var(--red);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--ink-2);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  margin: 12px 0;
  line-height: 1.5;
}
.alert strong { color: var(--red); }

/* booking tracker */
.booking-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
  gap: 8px;
}
.booking-row:last-child { border-bottom: 0; }
.booking-row .name { font-weight: 500; color: var(--ink); flex: 1; min-width: 0; }
.booking-row .name .sub { display: block; font-weight: 400; color: var(--ink-3); font-size: 11.5px; margin-top: 1px; }

/* etiquette */
.etiq-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--line-soft);
}
.etiq-item:last-child { border-bottom: 0; }
.etiq-item h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--wine);
  margin-bottom: 3px;
}
.etiq-item p { font-size: 13px; color: var(--ink-2); line-height: 1.5; }

/* ─── EMERGENCY TAB ──────────────────────────────────────── */
.emerg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.emerg-call {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 18px 10px;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
}
.emerg-call:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.emerg-call:active { transform: scale(0.97); }
.emerg-icon { font-size: 26px; line-height: 1; }
.emerg-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--wine);
  line-height: 1;
  letter-spacing: 0.02em;
}
.emerg-label {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
}

.contact-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
}
.contact-card:hover { background: var(--paper-2); }
.contact-name { font-weight: 600; font-size: 14px; color: var(--ink); flex: 1; min-width: 0; }
.contact-name .sub { display: block; font-weight: 400; font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
.contact-phone {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--wine);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

/* phrases */
.phrase {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
}
.phrase:last-child { border-bottom: 0; }
.phrase .en { color: var(--ink-3); font-style: italic; }
.phrase .it {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  text-align: right;
}
.phrase .it small { display: block; color: var(--ink-3); font-size: 11px; font-style: italic; margin-top: 1px; }

/* toast */
#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--paper);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 22px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  z-index: 999;
  white-space: nowrap;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* tablet+ */
@media (min-width: 700px) {
  .header-top { padding: 14px 32px 12px; }
  .tab-nav { padding: 0 32px; }
  .tab-btn { font-size: 13px; padding: 12px 20px; flex: none; }
  .brand-title { font-size: 22px; }
  #cest-clock { font-size: 21px; }
  .tab-panel { padding: 28px 28px 80px; max-width: 920px; }
  .hero-title { font-size: 56px; }
  .day-strip { grid-template-columns: 1fr 1fr; }
  .emerg-grid { grid-template-columns: repeat(4, 1fr); }
  .hotels-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 1100px) {
  .tab-panel { max-width: 1100px; }
  #days-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-items: start;
  }
  #days-container > .section-label,
  #days-container > .hero,
  #days-container > .hotels-wrap { grid-column: 1 / -1; }
  .day-card { margin-bottom: 0; }
}

/* print-friendly fallback */
@media print {
  #app-header, .tab-nav, #toast { display: none; }
  .tab-panel { display: block !important; }
  .day-card { break-inside: avoid; }
  .day-card .day-body { display: block !important; }
}
</style>

/* ═════════════════════════════════════════════════════════════
   HELPERS

function $(sel, root) { return (root || document).querySelector(sel); }
function $$(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

function todayInTZ() {
  // 'YYYY-MM-DD' in trip timezone
  const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit' });
  return fmt.format(new Date());
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1900);
}

function copyText(text) {
  try {
    navigator.clipboard.writeText(text).then(() => toast('Copied ✓'), () => fallback());
  } catch (e) { fallback(); }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Copied ✓'); } catch (e) { toast('Could not copy'); }
    document.body.removeChild(ta);
  }
}

function mapsLink(query) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
}
function navLink(query) {
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(query) + '&travelmode=driving';
}

/* ═════════════════════════════════════════════════════════════
   CLOCK + TRIP-DAY LABEL
   ═════════════════════════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const t = new Intl.DateTimeFormat('en-GB', {
    timeZone: TIMEZONE, hour: '2-digit', minute: '2-digit', hour12: false
  }).format(now);
  const clock = $('#cest-clock');
  if (clock) clock.textContent = t;

  // trip day label
  const today = todayInTZ();
  const start = TRIP.startDate, end = TRIP.endDate;
  const lbl = $('#trip-day-label');
  if (!lbl) return;

  if (today < start) {
    const days = Math.ceil((new Date(start) - new Date(today)) / 86400000);
    lbl.textContent = days === 1 ? 'T-1 day · CEST' : `T-${days} days · CEST`;
  } else if (today > end) {
    lbl.textContent = 'Trip complete · CEST';
  } else {
    const dayIdx = Math.floor((new Date(today) - new Date(start)) / 86400000) + 1;
    lbl.textContent = `Day ${dayIdx} of ${TRIP.days.length} · CEST`;
  }
}

/* ═════════════════════════════════════════════════════════════
   WEATHER — Open-Meteo (free, no API key required)
   To swap for OpenWeatherMap, replace fetchWeather() and
   set OWM_KEY = 'your_key_here' below.
   ═════════════════════════════════════════════════════════════ */
const CITY_COORDS = {
  Alba:      { lat: 44.7009, lon: 8.0354 },
  Monaco:    { lat: 43.7384, lon: 7.4246 },
  Toulon:    { lat: 43.1242, lon: 5.9280 },
  Grenoble:  { lat: 45.1885, lon: 5.7245 },
  Chambery:  { lat: 45.5646, lon: 5.9178 },
  Turin:     { lat: 45.0703, lon: 7.6869 }
};

function wmoToEmoji(code) {
  if (code === 0)                return { icon: '☀️', desc: 'Clear' };
  if (code <= 2)                 return { icon: '⛅', desc: 'Partly cloudy' };
  if (code === 3)                return { icon: '☁️', desc: 'Overcast' };
  if (code >= 45 && code <= 48)  return { icon: '🌫️', desc: 'Foggy' };
  if (code >= 51 && code <= 57)  return { icon: '🌦️', desc: 'Drizzle' };
  if (code >= 61 && code <= 67)  return { icon: '🌧️', desc: 'Rain' };
  if (code >= 80 && code <= 82)  return { icon: '🌦️', desc: 'Showers' };
  if (code >= 95)                return { icon: '⛈️', desc: 'Storms' };
  return { icon: '🌤️', desc: 'Mixed' };
}

async function fetchWeather() {
  const cities = Object.entries(CITY_COORDS);
  const results = {};
  await Promise.allSettled(cities.map(async ([city, { lat, lon }]) => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode`
        + `&timezone=Europe%2FRome&forecast_days=16`;
      const res = await fetch(url);
      const data = await res.json();
      data.daily.time.forEach((date, i) => {
        results[`${city}-${date}`] = {
          max:  Math.round(data.daily.temperature_2m_max[i]),
          min:  Math.round(data.daily.temperature_2m_min[i]),
          rain: data.daily.precipitation_probability_max[i] ?? 0,
          code: data.daily.weathercode[i]
        };
      });
    } catch (e) { /* silent fail */ }
  }));
  return results;
}

function weatherCellHTML(day) {
  const key = `${day.weatherCity}-${day.date}`;
  const w = weatherCache[key];
  if (!w) {
    return `<span class="val" style="color:var(--ink-3)">Forecast available within 16 days of travel</span>`;
  }
  const { icon, desc } = wmoToEmoji(w.code);
  return `<span class="val"><span class="weather-icon">${icon}</span> ${w.min}° / ${w.max}°C · ${desc} · ${w.rain}% rain</span>`;
}

function stopHTML(s) {
  const tagBits = [];
  if (s.tag) tagBits.push(`<span class="stop-type-tag">${s.tag}</span>`);
  if (s.badge) tagBits.push(`<span class="badge ${s.badgeClass || ''}">${s.badge}</span>`);

  const actions = [];
  if (s.mapsQuery) {
    actions.push(`<a class="act-btn" href="${mapsLink(s.mapsQuery)}" target="_blank" rel="noopener">📍 Map</a>`);
    actions.push(`<a class="act-btn primary" href="${navLink(s.mapsQuery)}" target="_blank" rel="noopener">🧭 Navigate</a>`);
  }
  if (s.locationName || s.address) {
    const addr = s.address || s.locationName;
    actions.push(`<button class="act-btn" onclick="copyText(${JSON.stringify(addr).replace(/"/g, '&quot;')})">📋 Copy</button>`);
  }
  if (s.phone) {
    actions.push(`<a class="act-btn tel" href="tel:${s.phone.replace(/\s+/g, '')}">📞 Call</a>`);
  }
  if (s.web) {
    actions.push(`<a class="act-btn" href="${s.web}" target="_blank" rel="noopener">🌐 Site</a>`);
  }

  let driveBlock = '';
  if (s.drive) {
    driveBlock = `
      <div class="drive-card">
        <span class="miles">${s.drive.km} km</span>
        <span>${s.drive.hrs}${s.drive.via ? ' · ' + s.drive.via : ''}</span>
      </div>
    `;
  }

  return `
    <div class="stop" data-type="${s.type || 'leisure'}">
      <div class="stop-header">
        <span class="stop-time">${s.time || ''}</span>
        ${tagBits.join('')}
      </div>
      <div class="stop-title">${s.title}</div>
      ${s.subtitle ? `<div class="stop-subtitle">${s.subtitle}</div>` : ''}
      ${driveBlock}
      ${s.locationName ? `<div class="stop-loc">${s.locationName}</div>` : ''}
      ${s.notes ? `<div class="stop-notes">${s.notes}</div>` : ''}
      ${actions.length ? `<div class="stop-actions">${actions.join('')}</div>` : ''}
    </div>
  `;
}

function toggleDay(btn) {
  const card = btn.closest('.day-card');
  const open = card.classList.toggle('expanded');
  btn.setAttribute('aria-expanded', open);
}

/* ═════════════════════════════════════════════════════════════
   FX CONVERTER
   ═════════════════════════════════════════════════════════════ */
function setupFX() {
  const eur = $('#fx-eur'), gbp = $('#fx-gbp'), usd = $('#fx-usd');
  if (!eur) return;
  eur.value = 100;
  convertFX('eur');
}
function convertFX(src) {
  const eur = $('#fx-eur'), gbp = $('#fx-gbp'), usd = $('#fx-usd');
  if (!eur || !gbp || !usd) return;
  let e = parseFloat(eur.value), g = parseFloat(gbp.value), u = parseFloat(usd.value);
  if (src === 'eur' && !isNaN(e)) {
    gbp.value = (e * FX_GBP_PER_EUR).toFixed(2);
    usd.value = (e * FX_USD_PER_EUR).toFixed(2);
  } else if (src === 'gbp' && !isNaN(g)) {
    e = g / FX_GBP_PER_EUR;
    eur.value = e.toFixed(2);
    usd.value = (e * FX_USD_PER_EUR).toFixed(2);
  } else if (src === 'usd' && !isNaN(u)) {
    e = u / FX_USD_PER_EUR;
    eur.value = e.toFixed(2);
    gbp.value = (e * FX_GBP_PER_EUR).toFixed(2);
  }
}

/* ═════════════════════════════════════════════════════════════
   TABS
   ═════════════════════════════════════════════════════════════ */
function switchTab(name) {
  activeTab = name;
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═════════════════════════════════════════════════════════════
   INIT
   ═════════════════════════════════════════════════════════════ */
function refreshWeatherInDOM() {
  $$('[data-weather]').forEach(el => {
    const key = el.dataset.key;
    const w = weatherCache[key];
    if (!w) return;
    const { icon, desc } = wmoToEmoji(w.code);
    el.querySelector('.val')?.remove();
    const v = document.createElement('span');
    v.className = 'val';
    v.innerHTML = `<span class="weather-icon">${icon}</span> ${w.min}° / ${w.max}°C · ${desc} · ${w.rain}% rain`;
    el.appendChild(v);
  });
}

(async function init() {
  renderItinerary();
  renderUtilities();
  renderEmergency();
  updateClock();
  setInterval(updateClock, 30 * 1000);

  weatherCache = await fetchWeather();
  refreshWeatherInDOM();
})();
</script>
