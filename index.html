<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1E1E1E" />
<meta name="color-scheme" content="light" />
<meta name="format-detection" content="telephone=no" />
<title>Mini Italy 2026 · Gerhard · Happy Camper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#2a1f1a;--ink-2:#4a3b32;--ink-3:#75645a;--ink-4:#a39185;
  --cream:#F5EDD6;--paper:#fafaf7;--paper-2:#F5EDD6;--white:#ffffff;
  --wine:#C9A84C;--wine-deep:#1E1E1E;--wine-soft:#B8993C;--wine-pale:#F5EDD6;
  --ochre:#C9A84C;--ochre-bright:#d4ae6a;--ochre-soft:#F5EDD6;
  --olive:#5c6b3f;--olive-soft:#e8ecdc;
  --line:rgba(201,168,76,0.20);--line-soft:rgba(201,168,76,0.10);--line-strong:rgba(201,168,76,0.35);
  --green:#2d6a3f;--green-soft:#d6efd6;--amber:#b88e2a;--amber-soft:#fff4cc;
  --red:#b8291e;--red-soft:#fdecea;--grey-soft:#ececea;
  --shadow-sm:0 1px 2px rgba(42,31,26,0.05),0 1px 1px rgba(42,31,26,0.03);
  --shadow-md:0 4px 16px rgba(42,31,26,0.06),0 1px 3px rgba(42,31,26,0.04);
  --shadow-lg:0 12px 32px rgba(42,31,26,0.08),0 2px 6px rgba(42,31,26,0.04);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Poppins',system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.5;min-height:100dvh;overflow-x:hidden;}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;}
a{color:var(--wine);text-decoration:none;}
#app-header{position:sticky;top:0;z-index:100;background:#1E1E1E;border-bottom:2px solid var(--ochre);padding-top:env(safe-area-inset-top);}
.header-top{padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1200px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.brand-mark{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ochre) 0%,#1E1E1E 100%);display:grid;place-items:center;font-size:16px;flex-shrink:0;box-shadow:var(--shadow-sm);border:1px solid rgba(201,168,76,0.4);}
.brand-text{min-width:0;}
.brand-title{font-family:'Lora',Georgia,serif;font-size:20px;font-weight:600;line-height:1;letter-spacing:.01em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brand-sub{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ochre);margin-top:3px;font-weight:500;}
.clock-block{display:flex;flex-direction:column;align-items:flex-end;text-align:right;flex-shrink:0;}
#cest-clock{font-family:'Lora',Georgia,serif;font-size:19px;font-weight:500;letter-spacing:.04em;line-height:1;color:var(--ochre);font-variant-numeric:tabular-nums;}
#trip-day-label{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,168,76,0.7);margin-top:4px;font-weight:500;}
.tab-nav{display:flex;gap:4px;padding:0 20px;border-top:1px solid rgba(201,168,76,0.2);max-width:1200px;margin:0 auto;background:#1E1E1E;}
.tab-btn{flex:1;padding:10px 8px;font-size:11px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,0.45);border-bottom:2px solid transparent;transition:color .18s,border-color .18s;}
.tab-btn.active{color:var(--ochre);border-bottom-color:var(--ochre);}
.tab-btn:active{transform:scale(0.97);}
.tab-panel{display:none;max-width:720px;margin:0 auto;padding:24px 18px 80px;}
.tab-panel.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.hero{text-align:center;padding:28px 16px 26px;background:#1E1E1E;border:1px solid rgba(201,168,76,0.25);border-radius:var(--r-lg);margin-bottom:24px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 0%,rgba(201,168,76,0.10) 0%,transparent 50%),radial-gradient(circle at 80% 100%,rgba(201,168,76,0.06) 0%,transparent 50%);pointer-events:none;}
.hero-eyebrow{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ochre);font-weight:600;margin-bottom:10px;position:relative;}
.hero-title{font-family:'Lora',Georgia,serif;font-size:44px;font-weight:500;line-height:1.05;letter-spacing:-.01em;color:#fff;margin-bottom:4px;position:relative;}
.hero-title em{font-style:italic;font-weight:400;color:var(--ochre);}
.hero-sub{font-family:'Lora',Georgia,serif;font-style:italic;font-size:19px;color:rgba(255,255,255,0.65);margin-top:4px;position:relative;}
.hero-rule{width:60px;height:1px;background:var(--ochre);margin:14px auto;position:relative;}
.hero-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 16px;font-size:13px;color:rgba(255,255,255,0.55);position:relative;margin-top:4px;}
.hero-meta strong{color:var(--ochre);font-weight:600;}
.hero-name{font-family:'Lora',Georgia,serif;font-size:22px;font-weight:500;color:#fff;margin-top:14px;position:relative;letter-spacing:.01em;}
.hero-name-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,0.7);margin-top:4px;font-weight:500;position:relative;}
.section-label{display:flex;align-items:center;gap:12px;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ochre);font-weight:600;margin:24px 0 14px;}
.section-label::before,.section-label::after{content:"";flex:1;height:1px;background:rgba(201,168,76,0.25);}
.hotels-grid{display:grid;gap:8px;margin-bottom:8px;}
.hotel-card{background:var(--white);border:1px solid rgba(201,168,76,0.18);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);}
.hotel-num{width:28px;height:28px;border-radius:50%;background:#1E1E1E;color:var(--ochre);display:grid;place-items:center;font-family:'Lora',serif;font-size:15px;font-weight:600;flex-shrink:0;}
.hotel-info{flex:1;min-width:0;}
.hotel-name{font-weight:600;font-size:14px;color:var(--ink);line-height:1.3;margin-bottom:2px;}
.hotel-meta{font-size:11.5px;color:var(--ink-3);letter-spacing:.02em;}
.hotel-link{color:var(--ochre);font-size:18px;flex-shrink:0;}
.day-card{background:var(--white);border:1px solid rgba(201,168,76,0.15);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;transition:box-shadow .2s,border-color .2s;}
.day-card.is-current{border-color:var(--ochre);box-shadow:var(--shadow-md),0 0 0 3px rgba(201,168,76,0.08);}
.day-card.is-past{opacity:.62;}
.day-header{width:100%;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;transition:background .15s;}
.day-header:hover{background:var(--paper-2);}
.day-num{width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--cream);border:1px solid rgba(201,168,76,0.3);display:grid;place-items:center;font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--ink);}
.day-card.is-current .day-num{background:#1E1E1E;color:var(--ochre);border-color:var(--ochre);}
.day-meta{flex:1;min-width:0;}
.day-date{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--ink);line-height:1.15;}
.day-title{font-size:12px;color:var(--ink-3);margin-top:2px;letter-spacing:.02em;}
.day-city-badge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#1E1E1E;font-weight:700;background:var(--ochre);padding:3px 8px;border-radius:10px;flex-shrink:0;}
.day-toggle{font-size:18px;color:var(--ochre);transition:transform .25s;flex-shrink:0;margin-left:4px;}
.day-card.expanded .day-toggle{transform:rotate(180deg);}
.day-body{display:none;padding:0 16px 16px;border-top:1px solid rgba(201,168,76,0.12);}
.day-card.expanded .day-body{display:block;}
.day-strip{display:grid;grid-template-columns:1fr;gap:8px;padding:12px 0 14px;border-bottom:1px solid rgba(201,168,76,0.10);margin-bottom:14px;}
.strip-item{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-2);}
.strip-item .label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ochre);font-weight:600;flex-shrink:0;min-width:56px;}
.strip-item .val{font-weight:500;color:var(--ink);flex:1;}
.day-note{background:var(--ochre-soft);border-left:3px solid var(--ochre);padding:10px 12px;font-size:13px;font-style:italic;color:var(--ink-2);border-radius:0 var(--r-sm) var(--r-sm) 0;margin-bottom:14px;line-height:1.45;}
.stops{display:flex;flex-direction:column;gap:0;}
.stop{position:relative;padding:8px 0 18px 38px;border-left:1px solid rgba(201,168,76,0.25);margin-left:14px;}
.stop:last-child{padding-bottom:4px;}
.stop::before{content:"";position:absolute;left:-7px;top:14px;width:13px;height:13px;border-radius:50%;background:var(--white);border:2px solid var(--ochre);z-index:1;}
.stop[data-type="restaurant"]::before{border-color:#1E1E1E;background:var(--ochre);}
.stop[data-type="hotel"]::before{border-color:var(--olive);}
.stop[data-type="drive"]::before{border-color:var(--ink-3);}
.stop[data-type="train"]::before,.stop[data-type="flight"]::before{border-color:var(--ochre);}
.stop-header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
.stop-time{font-family:'Lora',serif;font-size:17px;font-weight:600;color:#1E1E1E;letter-spacing:.01em;flex-shrink:0;}
.stop-type-tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);font-weight:600;padding:2px 7px;border-radius:8px;background:var(--ochre-soft);border:1px solid rgba(201,168,76,0.25);}
.stop-title{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--ink);line-height:1.2;margin:2px 0 4px;}
.stop-subtitle{font-size:13px;color:var(--ink-2);margin-bottom:6px;font-style:italic;}
.badge{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:10px;margin-right:5px;margin-bottom:4px;border:1px solid transparent;}
.badge.confirmed{background:var(--green-soft);color:var(--green);border-color:rgba(45,106,63,0.2);}
.badge.pending{background:var(--amber-soft);color:var(--amber);border-color:rgba(184,142,42,0.25);}
.badge.priority{background:var(--red-soft);color:var(--red);border-color:rgba(184,41,30,0.25);}
.badge.suggestion,.badge.walkin{background:var(--grey-soft);color:var(--ink-3);border-color:var(--line);}
.badge.host{background:var(--ochre-soft);color:#7a5e1a;border-color:rgba(201,168,76,0.35);}
.stop-loc{font-size:12.5px;color:var(--ink-3);margin:4px 0 8px;display:flex;gap:6px;align-items:flex-start;}
.stop-loc::before{content:"📍";font-size:11px;flex-shrink:0;line-height:1.4;}
.stop-notes{font-size:13px;color:var(--ink-2);line-height:1.5;margin:6px 0 10px;}
.stop-notes em{background:var(--ochre-soft);padding:1px 5px;border-radius:3px;font-style:normal;color:#6a4c10;font-weight:500;}
.stop-actions{display:flex;gap:6px;flex-wrap:wrap;}
.act-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;font-size:11.5px;font-weight:600;letter-spacing:.02em;background:var(--cream);color:var(--ink);border-radius:18px;border:1px solid rgba(201,168,76,0.25);transition:all .15s;}
.act-btn:hover{background:var(--ochre-soft);border-color:var(--ochre);}
.act-btn:active{transform:scale(0.96);}
.act-btn.primary{background:#1E1E1E;color:var(--ochre);border-color:var(--ochre);}
.act-btn.primary:hover{background:#2C2C2C;}
.act-btn.tel{background:var(--olive-soft);border-color:rgba(92,107,63,0.25);color:var(--olive);}
.drive-card{background:var(--paper-2);border:1px dashed rgba(201,168,76,0.4);border-radius:var(--r-md);padding:10px 12px;font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:10px;margin-top:4px;}
.drive-card .miles{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--ochre);flex-shrink:0;}
.util-card{background:var(--white);border:1px solid rgba(201,168,76,0.15);border-radius:var(--r-lg);padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.util-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.15;}
.util-sub{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);font-weight:600;margin-bottom:14px;}
.fx-rate-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink-3);margin-bottom:12px;padding:8px 12px;background:var(--paper-2);border-radius:var(--r-sm);border:1px solid rgba(201,168,76,0.15);}
.fx-rate-row strong{color:var(--ink);}
.fx-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.fx-row label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:600;width:36px;flex-shrink:0;}
.fx-row input{flex:1;font:500 17px 'Poppins',sans-serif;font-variant-numeric:tabular-nums;padding:10px 12px;border:1px solid rgba(201,168,76,0.25);border-radius:var(--r-sm);background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s;}
.fx-row input:focus{border-color:var(--ochre);}
.kv-list{display:grid;gap:8px;}
.kv-item{display:grid;grid-template-columns:minmax(90px,auto) 1fr;gap:10px;font-size:13px;padding:8px 0;border-bottom:1px solid rgba(201,168,76,0.10);}
.kv-item:last-child{border-bottom:0;}
.kv-key{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);font-weight:600;padding-top:1px;}
.kv-val{color:var(--ink);font-weight:500;}
.kv-val .sub{display:block;color:var(--ink-3);font-weight:400;font-size:12px;margin-top:2px;}
.tip{background:var(--olive-soft);border-left:3px solid var(--olive);padding:10px 12px;font-size:12.5px;color:var(--ink-2);border-radius:0 var(--r-sm) var(--r-sm) 0;margin:12px 0;line-height:1.5;}
.tip strong{color:var(--olive);}
.alert{background:var(--red-soft);border-left:3px solid var(--red);padding:10px 12px;font-size:12.5px;color:var(--ink-2);border-radius:0 var(--r-sm) var(--r-sm) 0;margin:12px 0;line-height:1.5;}
.alert strong{color:var(--red);}
.booking-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.10);font-size:13px;gap:8px;}
.booking-row:last-child{border-bottom:0;}
.booking-row .name{font-weight:500;color:var(--ink);flex:1;min-width:0;}
.booking-row .name .sub{display:block;font-weight:400;color:var(--ink-3);font-size:11.5px;margin-top:1px;}
.etiq-item{padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.10);}
.etiq-item:last-child{border-bottom:0;}
.etiq-item h4{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--ochre);margin-bottom:3px;}
.etiq-item p{font-size:13px;color:var(--ink-2);line-height:1.5;}
.emerg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.emerg-call{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:18px 10px;background:var(--white);border:1px solid rgba(201,168,76,0.18);border-radius:var(--r-md);text-align:center;transition:transform .15s,box-shadow .15s;}
.emerg-call:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
.emerg-call:active{transform:scale(0.97);}
.emerg-icon{font-size:26px;line-height:1;}
.emerg-num{font-family:'Lora',serif;font-size:26px;font-weight:600;color:#1E1E1E;line-height:1;letter-spacing:.02em;}
.emerg-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;}
.contact-card{background:var(--white);border:1px solid rgba(201,168,76,0.15);border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:background .15s;}
.contact-card:hover{background:var(--paper-2);}
.contact-name{font-weight:600;font-size:14px;color:var(--ink);flex:1;min-width:0;}
.contact-name .sub{display:block;font-weight:400;font-size:11.5px;color:var(--ink-3);margin-top:1px;}
.contact-phone{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--ochre);flex-shrink:0;letter-spacing:.02em;}
.phrase{display:grid;grid-template-columns:1fr auto;gap:8px 12px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.10);font-size:13px;}
.phrase:last-child{border-bottom:0;}
.phrase .en{color:var(--ink-3);font-style:italic;}
.phrase .it{font-family:'Lora',serif;font-size:16px;font-weight:500;color:var(--ink);text-align:right;}
.phrase .it small{display:block;color:var(--ink-3);font-size:11px;font-style:italic;margin-top:1px;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E1E1E;color:var(--ochre);font-size:13px;font-weight:500;padding:10px 20px;border-radius:22px;border:1px solid var(--ochre);opacity:0;pointer-events:none;transition:all .22s cubic-bezier(0.4,0,0.2,1);z-index:999;white-space:nowrap;max-width:90vw;box-shadow:var(--shadow-lg);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:700px){
  .header-top{padding:14px 32px 12px;}.tab-nav{padding:0 32px;}
  .tab-btn{font-size:12px;padding:12px 20px;flex:none;}.brand-title{font-size:22px;}
  #cest-clock{font-size:21px;}.tab-panel{padding:28px 28px 80px;max-width:920px;}
  .hero-title{font-size:56px;}.day-strip{grid-template-columns:1fr 1fr;}
  .emerg-grid{grid-template-columns:repeat(4,1fr);}.hotels-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<header id="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">🇮🇹</div>
      <div class="brand-text">
        <div class="brand-title">Mini Italy 2026</div>
        <div class="brand-sub">Happy Camper · 4–10 August</div>
      </div>
    </div>
    <div class="clock-block">
      <span id="cest-clock">--:--</span>
      <span id="trip-day-label">Loading…</span>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="itinerary" onclick="switchTab('itinerary')">Itinerary</button>
    <button class="tab-btn" data-tab="utilities" onclick="switchTab('utilities')">Utilities</button>
    <button class="tab-btn" data-tab="emergency" onclick="switchTab('emergency')">Emergency</button>
  </nav>
</header>

<main>
  <section id="tab-itinerary" class="tab-panel active"></section>
  <section id="tab-utilities" class="tab-panel"></section>
  <section id="tab-emergency" class="tab-panel"></section>
</main>

<div id="toast" role="status" aria-live="polite">Copied ✓</div>

<script>
'use strict';

const FX_GBP_PER_EUR = 0.855;
const FX_CHF_PER_EUR = 0.960;
const TIMEZONE = 'Europe/Paris';

const TRIP = {
  tripTitle:  'Mini Italy 2026',
  traveler:   'Gerhard Huber',
  curator:    'Happy Camper Ltd.',
  startDate:  '2026-08-04',

  hotels: [
    { name: 'Castello di Guarene — R&C', location: 'Guarene, Langhe, Italy',    nights: 'Tue 4 Aug',   mapsQuery: 'Castello di Guarene Relais Chateaux', phone: '+390173441332' },
    { name: 'Il Boscareto Resort & Spa',  location: 'Serralunga d\'Alba, Italy', nights: 'Wed 5 Aug',   mapsQuery: 'Il Boscareto Resort Spa Serralunga',  phone: '+390173613042' },
    { name: 'Grand Hotel del Mare',       location: 'Bordighera, Liguria',       nights: 'Thu 6 Aug',   mapsQuery: 'Grand Hotel del Mare Bordighera',     phone: '+390184262201' },

/* ─── Helpers ─────────────────────────────────────────────────────── */
let weatherCache = {}, activeTab = 'itinerary';
function $(s,r){return(r||document).querySelector(s);}
function $$(s,r){return Array.from((r||document).querySelectorAll(s));}
function todayInTZ(){return new Intl.DateTimeFormat('en-CA',{timeZone:TIMEZONE,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1900);}
function copyText(t){try{navigator.clipboard.writeText(t).then(()=>toast('Copied ✓'),fb);}catch(e){fb();}function fb(){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();try{document.execCommand('copy');toast('Copied ✓');}catch(e){toast('Could not copy');}document.body.removeChild(a);}}
function mapsLink(q){return'https://maps.apple.com/?q='+encodeURIComponent(q);}
function navLink(q){return'https://maps.apple.com/?daddr='+encodeURIComponent(q)+'&dirflg=d';}

function updateClock(){
  const t=new Intl.DateTimeFormat('en-GB',{timeZone:TIMEZONE,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date());
  const c=$('#cest-clock');if(c)c.textContent=t;
  const today=todayInTZ(),lbl=$('#trip-day-label');if(!lbl)return;
  if(today<TRIP.startDate){const d=Math.ceil((new Date(TRIP.startDate)-new Date(today))/86400000);lbl.textContent=d===1?'T-1 day · CEST':`T-${d} days · CEST`;}
  else if(today>TRIP.endDate){lbl.textContent='Trip complete · CEST';}
  else{const idx=Math.floor((new Date(today)-new Date(TRIP.startDate))/86400000)+1;lbl.textContent=`Day ${idx} of ${TRIP.days.length} · CEST`;}
}

const CITY_COORDS={Turin:{lat:45.0703,lon:7.6869},Cuneo:{lat:44.3842,lon:7.5427},Imperia:{lat:43.8872,lon:8.0310},Toulon:{lat:43.1242,lon:5.9280},Nimes:{lat:43.8367,lon:4.3601},Chambery:{lat:45.5646,lon:5.9178}};
function wmoToEmoji(c){if(c===0)return{icon:'☀️',desc:'Clear'};if(c<=2)return{icon:'⛅',desc:'Partly cloudy'};if(c===3)return{icon:'☁️',desc:'Overcast'};if(c>=51&&c<=67)return{icon:'🌧️',desc:'Rain'};if(c>=80&&c<=82)return{icon:'🌦️',desc:'Showers'};if(c>=95)return{icon:'⛈️',desc:'Storms'};return{icon:'🌤️',desc:'Mixed'};}
async function fetchWeather(){const r={};await Promise.allSettled(Object.entries(CITY_COORDS).map(async([city,{lat,lon}])=>{try{const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Europe%2FParis&forecast_days=16`;const d=await(await fetch(url)).json();d.daily.time.forEach((date,i)=>{r[`${city}-${date}`]={max:Math.round(d.daily.temperature_2m_max[i]),min:Math.round(d.daily.temperature_2m_min[i]),rain:d.daily.precipitation_probability_max[i]??0,code:d.daily.weathercode[i]};});}catch(e){}}));return r;}
function weatherCellHTML(day){const w=weatherCache[`${day.weatherCity}-${day.date}`];if(!w)return`<span class="val" style="color:var(--ink-3)">Forecast within 16 days</span>`;const{icon,desc}=wmoToEmoji(w.code);return`<span class="val">${icon} ${w.min}°/${w.max}°C · ${desc} · ${w.rain}% rain</span>`;}

function renderItinerary(){
  const root=$('#tab-itinerary'),today=todayInTZ();let html='';
  html+=`<div class="hero"><div class="hero-eyebrow">Private Travel · 2026</div><h1 class="hero-title">Mini <em>Italy</em></h1><div class="hero-sub">Langhe · Ligurian Riviera · Provence · Vercors · Savoie</div><div class="hero-rule"></div><div class="hero-meta"><span>🗓 <strong>4–10 Aug 2026</strong></span><span>✈️ <strong>MAN → MXP</strong></span><span>✈️ <strong>TRN → SZG</strong></span><span>🚗 <strong>Self-drive</strong></span><span>🏨 <strong>6 hotels</strong></span><span>🍽 <strong>7 restaurants</strong></span><span>📍 <strong>~1,200 km</strong></span></div><div class="hero-name">Gerhard Huber</div><div class="hero-name-sub">A Personal Journey · Happy Camper Ltd.</div></div>`;
  html+=`<div class="section-label">Hotels at a glance</div><div class="hotels-grid">`;
  TRIP.hotels.forEach((h,i)=>{html+=`<div class="hotel-card"><div class="hotel-num">${i+1}</div><div class="hotel-info"><div class="hotel-name">${h.name}</div><div class="hotel-meta">${h.location} · ${h.nights}</div></div><a class="hotel-link" href="${mapsLink(h.mapsQuery)}" target="_blank" rel="noopener">↗</a></div>`;});
  html+=`</div><div class="section-label">Day by day</div><div id="days-container">`;
  TRIP.days.forEach((d,di)=>{
    const isCurrent=d.date===today,isPast=d.date<today,cls=['day-card'];
    if(isCurrent)cls.push('is-current','expanded');if(isPast)cls.push('is-past');
    if(di===0&&!isCurrent&&!isPast)cls.push('expanded');
    html+=`<article class="${cls.join(' ')}" data-date="${d.date}"><button class="day-header" aria-expanded="${cls.includes('expanded')}" onclick="toggleDay(this)"><div class="day-num">${d.dayNum}</div><div class="day-meta"><div class="day-date">${d.weekday}</div><div class="day-title">${d.city}</div></div>${isCurrent?'<span class="day-city-badge">Today</span>':''}<span class="day-toggle">⌃</span></button><div class="day-body"><div class="day-strip"><div class="strip-item"><span class="label">Hotel</span>${d.hotel==='—'?'<span class="val" style="color:var(--ink-3)">Departure</span>':`<span class="val">${d.hotel}</span>`}</div><div class="strip-item" data-weather data-key="${d.weatherCity}-${d.date}"><span class="label">Weather</span>${weatherCellHTML(d)}</div></div>${d.note?`<div class="day-note">${d.note}</div>`:''}<div class="stops">${d.stops.map(stopHTML).join('')}</div></div></article>`;
  });
  html+=`</div>`;root.innerHTML=html;
}

function stopHTML(s){
  const tags=[];if(s.tag)tags.push(`<span class="stop-type-tag">${s.tag}</span>`);if(s.badge)tags.push(`<span class="badge ${s.badgeClass||''}">${s.badge}</span>`);
  const acts=[];if(s.mapsQuery){acts.push(`<a class="act-btn" href="${mapsLink(s.mapsQuery)}" target="_blank">📍 Map</a>`);acts.push(`<a class="act-btn primary" href="${navLink(s.mapsQuery)}" target="_blank">🧭 Navigate</a>`);}
  if(s.locationName)acts.push(`<button class="act-btn" onclick="copyText(${JSON.stringify(s.locationName).replace(/"/g,'&quot;')})">📋 Copy</button>`);
  if(s.phone)acts.push(`<a class="act-btn tel" href="tel:${s.phone.replace(/\s+/g,'')}">📞 Call</a>`);
  if(s.web)acts.push(`<a class="act-btn" href="${s.web}" target="_blank">🌐 Site</a>`);
  let drive='';if(s.drive)drive=`<div class="drive-card"><span class="miles">${s.drive.km} km</span><span>${s.drive.hrs} · ${s.drive.via}</span></div>`;
  return`<div class="stop" data-type="${s.type||'leisure'}"><div class="stop-header"><span class="stop-time">${s.time||''}</span>${tags.join('')}</div><div class="stop-title">${s.title}</div>${s.subtitle?`<div class="stop-subtitle">${s.subtitle}</div>`:''}${drive}${s.locationName?`<div class="stop-loc">${s.locationName}</div>`:''}${s.notes?`<div class="stop-notes">${s.notes}</div>`:''}${acts.length?`<div class="stop-actions">${acts.join('')}</div>`:''}</div>`;
}

function toggleDay(btn){const card=btn.closest('.day-card'),open=card.classList.toggle('expanded');btn.setAttribute('aria-expanded',open);}

function setupFX(){const e=$('#fx-eur'),g=$('#fx-gbp'),c=$('#fx-chf');if(!e)return;e.value=100;convertFX('eur');}
function fmt(n,d){return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function parseFmt(v){return parseFloat(v.replace(/,/g,''));}
function convertFX(src){
  const e=$('#fx-eur'),g=$('#fx-gbp'),c=$('#fx-chf');if(!e||!g||!c)return;
  let ev=parseFmt(e.value),gv=parseFmt(g.value),cv=parseFmt(c.value);
  if(src==='eur'&&!isNaN(ev)){g.value=fmt(ev*FX_GBP_PER_EUR,2);c.value=fmt(ev*FX_CHF_PER_EUR,2);}
  else if(src==='gbp'&&!isNaN(gv)){ev=gv/FX_GBP_PER_EUR;e.value=fmt(ev,2);c.value=fmt(ev*FX_CHF_PER_EUR,2);}
  else if(src==='chf'&&!isNaN(cv)){ev=cv/FX_CHF_PER_EUR;e.value=fmt(ev,2);g.value=fmt(ev*FX_GBP_PER_EUR,2);}
}
function switchTab(n){activeTab=n;$$('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===n));$$('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+n));window.scrollTo({top:0,behavior:'smooth'});}
function refreshWeather(){$$('[data-weather]').forEach(el=>{const w=weatherCache[el.dataset.key];if(!w)return;const{icon,desc}=wmoToEmoji(w.code);const v=el.querySelector('.val');if(v)v.remove();const s=document.createElement('span');s.className='val';s.innerHTML=`${icon} ${w.min}°/${w.max}°C · ${desc} · ${w.rain}% rain`;el.appendChild(s);});}
(async function init(){renderItinerary();renderUtilities();renderEmergency();updateClock();setInterval(updateClock,30000);weatherCache=await fetchWeather();refreshWeather();})();
